<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="falconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Falcon bird silhouette -->
  <g transform="translate(30, 25) scale(0.7)">
    <!-- Body -->
    <path d="M120 50 C100 30, 60 25, 40 60 C30 80, 35 100, 50 115 C60 125, 75 130, 90 128 C110 125, 130 110, 140 90 C145 75, 140 60, 120 50Z" fill="url(#falconGrad)"/>
    <!-- Wing -->
    <path d="M65 65 C45 45, 20 35, 5 50 C-5 60, 10 80, 30 85 C45 88, 55 82, 65 65Z" fill="#1976D2"/>
    <!-- Wing detail -->
    <path d="M55 75 C40 60, 20 55, 12 62 C5 68, 15 80, 30 82 C40 83, 48 80, 55 75Z" fill="#1E88E5"/>
    <!-- Tail feathers -->
    <path d="M130 85 C140 95, 165 110, 185 115 C175 105, 155 90, 140 82Z" fill="#1976D2"/>
    <path d="M125 90 C135 102, 155 120, 175 128 C165 115, 148 98, 133 88Z" fill="#1565C0"/>
    <!-- Head detail -->
    <path d="M50 70 C45 60, 40 55, 35 58 C32 60, 38 68, 50 70Z" fill="#0D47A1"/>
    <!-- Eye -->
    <circle cx="48" cy="62" r="3" fill="white"/>
    <circle cx="47" cy="62" r="1.5" fill="#0D47A1"/>
    <!-- Beak -->
    <path d="M35 63 L22 58 L33 67Z" fill="#F59E0B"/>
  </g>

  <!-- Medical cross -->
  <g transform="translate(110, 100)">
    <rect x="15" y="5" width="20" height="50" rx="3" fill="url(#crossGrad)"/>
    <rect x="5" y="15" width="50" height="20" rx="3" fill="url(#crossGrad)"/>
  </g>

  <!-- Company text -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565C0">FALCON<tspan fill="#DC2626">MED</tspan></text>
</svg>
